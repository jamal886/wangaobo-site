<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wang Aobo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Manrope',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:#f5f5f7;
    min-height:100vh;
    background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%),
        radial-gradient(circle at 90% 10%, rgba(255,255,255,0.04), transparent 28%),
        linear-gradient(180deg,#030303 0%,#080808 35%,#101010 100%);
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size:56px 56px;
    mask-image:linear-gradient(to bottom, rgba(0,0,0,.45), transparent 75%);
}

.container{
    width:min(100%,1060px);
    margin:0 auto;
    padding:50px 22px 90px;
}

.hero{
    position:relative;
    min-height:620px;
    margin-bottom:70px;
}

.hero video{
    width:min(78%,720px);
    border-radius:22px;
    display:block;
    box-shadow:0 35px 100px rgba(0,0,0,.6);
    border:1px solid rgba(255,255,255,.08);
}

.hero-photo{
    position:absolute;
    right:0;
    top:260px;
    width:min(42%,390px);
    border-radius:20px;
    box-shadow:0 30px 90px rgba(0,0,0,.58);
    border:1px solid rgba(255,255,255,.08);
    transform:rotate(4deg);
}

h1{
    text-align:center;
    font-size:clamp(60px,9vw,120px);
    font-weight:700;
    letter-spacing:-5px;
    line-height:.88;
    margin-bottom:28px;
    background:linear-gradient(180deg,#ffffff,#d4d4d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.art-divider{
    height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.14),transparent);
    margin-bottom:38px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:24px;
}

.art-item{
    animation:fadeIn .7s ease both;
}

.gallery img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:18px;
    display:block;
    cursor:pointer;
    transition:.32s ease;
    border:1px solid rgba(255,255,255,0.07);
    box-shadow:0 18px 45px rgba(0,0,0,.38);
    background:#181818;
}

.gallery img:hover{
    transform:translateY(-7px) scale(1.015);
    box-shadow:0 28px 70px rgba(0,0,0,.58);
    border-color:rgba(255,255,255,0.14);
}

.art-item p{
    text-align:center;
    margin-top:13px;
    color:#9f9f9f;
    font-size:13px;
    font-weight:600;
    letter-spacing:.2px;
}

.message{
    max-width:760px;
    margin:85px auto 0;
    background:linear-gradient(180deg,rgba(255,255,255,0.055),rgba(255,255,255,0.02));
    backdrop-filter:blur(28px);
    -webkit-backdrop-filter:blur(28px);
    border:1px solid rgba(255,255,255,0.075);
    border-radius:26px;
    padding:32px;
    box-shadow:0 30px 90px rgba(0,0,0,.46);
}

label{
    display:block;
    font-size:15px;
    font-weight:600;
    color:#d2d2d2;
    margin-bottom:12px;
}

textarea{
    width:100%;
    background:#141414;
    color:white;
    border:1px solid rgba(255,255,255,.07);
    border-radius:16px;
    padding:17px 18px;
    font-size:16px;
    margin-bottom:20px;
    outline:none;
    font-family:inherit;
}

textarea:focus{
    border-color:rgba(255,255,255,.28);
    box-shadow:0 0 0 4px rgba(255,255,255,.035);
}

button{
    width:100%;
    border:none;
    border-radius:16px;
    padding:17px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(180deg,#ffffff 0%,#d9d9d9 100%);
    color:#050505;
    transition:.25s ease;
    font-family:inherit;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 18px 40px rgba(255,255,255,0.11);
}

#lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.94);
    z-index:9999;
    justify-content:center;
    align-items:center;
    padding:22px;
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
}

#lightbox img{
    max-width:92%;
    max-height:90%;
    border-radius:20px;
    box-shadow:0 30px 90px rgba(0,0,0,.75);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(14px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media (max-width:768px){
    .container{
        padding:28px 14px 70px;
    }

    .hero{
        min-height:auto;
        margin-bottom:58px;
    }

    .hero video{
        width:100%;
        border-radius:18px;
    }

    .hero-photo{
        position:relative;
        width:82%;
        top:auto;
        right:auto;
        margin:-28px 0 0 auto;
        display:block;
        border-radius:18px;
        transform:rotate(3deg);
    }

    h1{
        letter-spacing:-3px;
    }

    .gallery{
        grid-template-columns:repeat(2,1fr);
        gap:15px;
    }

    .gallery img{
        border-radius:15px;
    }

    .art-item p{
        font-size:12.5px;
        margin-top:9px;
    }

    .message{
        padding:22px;
        border-radius:22px;
        margin-top:64px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
    <video src="intro.mp4" autoplay muted loop playsinline controls></video>
    <img class="hero-photo" src="zhaopian1.jpg">
</div>

<h1>MY ART</h1>
<div class="art-divider"></div>

<div class="gallery">
<div class="art-item"><img src="art1.jpg" onclick="openImage(this.src)"><p>PvZ Sunflower</p></div>
<div class="art-item"><img src="art2.jpg" onclick="openImage(this.src)"><p>Pickle Rick</p></div>
<div class="art-item"><img src="art3.jpg" onclick="openImage(this.src)"><p>Valorant Oni Shorty</p></div>
<div class="art-item"><img src="art4.jpg" onclick="openImage(this.src)"><p>LA Hat</p></div>
<div class="art-item"><img src="art5.jpg" onclick="openImage(this.src)"><p>Fortnite Beef Boss</p></div>
<div class="art-item"><img src="art6.jpg" onclick="openImage(this.src)"><p>Dropout Bear (VT jersey)</p></div>
<div class="art-item"><img src="art7.jpg" onclick="openImage(this.src)"><p>Clash Royale Set</p></div>
<div class="art-item"><img src="art8.jpg" onclick="openImage(this.src)"><p>Brawl Stars Set</p></div>
<div class="art-item"><img src="art9.jpg" onclick="openImage(this.src)"><p>Brawl Stars Set</p></div>
<div class="art-item"><img src="art10.jpg" onclick="openImage(this.src)"><p>Among Us Set</p></div>
<div class="art-item"><img src="art11.jpg" onclick="openImage(this.src)"><p>CSGO Bomb</p></div>
<div class="art-item"><img src="art12.jpg" onclick="openImage(this.src)"><p>Kanye Jesus Piece</p></div>
</div>

<div class="message">
<label>Say something:</label>
<textarea id="message" rows="5"></textarea>
<button onclick="submitMessage()">Submit</button>
</div>

</div>

<div id="lightbox" onclick="closeImage()">
<img id="lightboxImg">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl =
'https://fczqzbogxflzrdotlnqb.supabase.co';

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjenF6Ym9neGZsenJkb3RsbnFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjYyOTcsImV4cCI6MjA5NjcwMjI5N30.9dIoteKaOtThR940ecBPdRdqSnDvdW1_ppCgcLOq77E';

const supabaseClient =
supabase.createClient(supabaseUrl, supabaseKey);

async function submitMessage(){
    const message = document.getElementById('message').value.trim();

    await supabaseClient
    .from('Visitors')

function openImage(src){
    document.getElementById('lightbox').style.display='flex';
    document.getElementById('lightboxImg').src=src;
}

function closeImage(){
    document.getElementById('lightbox').style.display='none';
}
</script>

</body>
</html>
