<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wang Aobo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#050505;

    font-family:'Manrope',sans-serif;

    display:flex;
    justify-content:center;

    padding:60px 20px;

}

.container{

    width:100%;
    max-width:950px;

}

video{

    width:100%;

    display:block;

    border-radius:20px;

    object-fit:cover;

    box-shadow:
    0 40px 120px rgba(0,0,0,.6);

}

.degree{

    margin-top:60px;

}

.degree img{

    width:100%;

    display:block;

    border-radius:0;

    box-shadow:
    0 35px 100px rgba(0,0,0,.45);

}

@media (max-width:768px){

    body{
        padding:30px 12px;
    }

    .degree{
        margin-top:35px;
    }

    video{
        border-radius:14px;
    }

}

</style>

</head>

<body>

<div class="container">

<video
src="intro.mp4"
autoplay
muted
loop
playsinline
controls>
</video>

<div class="degree">

<img src="ced.jpg" alt="Virginia Tech Diploma">

</div>

</div>

</body>
</html>
