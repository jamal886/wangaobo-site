<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wang Aobo</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    width:min(100%,900px);
    margin:0 auto;
    padding:30px 16px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.card{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    width:100%;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:20px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
    font-size:18px;
    cursor:pointer;
}

#artSection{
    display:none;
    margin-top:60px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:auto;
    display:block;
    border-radius:12px;
}

@media (max-width:768px){
    .container{
        padding:20px 12px;
    }

    .card{
        padding:18px;
    }

    h1{
        font-size:48px;
    }

    input,
    textarea{
        font-size:16px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Welcome</h1>

<div class="card">

<label>What is your name?</label>
<input id="name">

<label>Why did you visit my website?</label>
<textarea id="reason" rows="4"></textarea>

<button onclick="submitForm()">Continue</button>

</div>

<div id="artSection">

<h1>MY ART</h1>

<div class="gallery">
<img src="art1.JPG">
<img src="art2.JPG">
<img src="art3.JPG">
<img src="art4.JPG">
<img src="art5.jpg">
<img src="art6.jpg">
<img src="art7.jpg">
<img src="art8.jpg">
<img src="art9.jpg">
<img src="art10.jpg">
<img src="art11.jpg">
<img src="art12.jpg">
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl =
'https://fczqzbogxflzrdotlnqb.supabase.co';

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjenF6Ym9neGZsenJkb3RsbnFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjYyOTcsImV4cCI6MjA5NjcwMjI5N30.9dIoteKaOtThR940ecBPdRdqSnDvdW1_ppCgcLOq77E';

const supabaseClient =
supabase.createClient(supabaseUrl, supabaseKey);

async function submitForm(){
    const name = document.getElementById('name').value;
    const reason = document.getElementById('reason').value;

    await supabaseClient
    .from('Visitors')
    .insert([
        {
            name:name,
            reason:reason
        }
    ]);

    document.querySelector('.card').style.display='none';
    document.getElementById('artSection').style.display='block';

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:'smooth'
    });
}
</script>

</body>
</html>
